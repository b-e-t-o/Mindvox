<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindvox Studio - Advanced STT Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Customização da scrollbar para o painel de resposta */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-6 relative overflow-x-hidden antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- Detalhes de luz de fundo decorativos (Glow Orbs) -->
    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Container Principal do Dashboard -->
    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6 bg-slate-900/60 backdrop-blur-xl p-6 sm:p-8 rounded-2xl shadow-[0_0_50px_-12px_rgba(0,0,0,0.7)] border border-slate-800/80 relative z-10">
        
        <!-- COLUNA ESQUERDA: ENTRADA DE DADOS (5 das 12 colunas) -->
        <div class="lg:col-span-5 flex flex-col justify-between space-y-6 border-b lg:border-b-0 lg:border-r border-slate-800/80 pb-6 lg:pb-0 lg:pr-6">
            <div class="space-y-1">
                <div class="flex items-center space-x-2">
                    <span class="h-2 w-2 rounded-full bg-gradient-to-r from-indigo-400 to-purple-500 animate-pulse"></span>
                    <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-slate-100 via-indigo-200 to-purple-300 bg-clip-text text-transparent">Mindvox Studio</h1>
                </div>
                <p class="text-xs text-slate-400 font-medium">Pipeline inteligente para extração de conhecimento acadêmico.</p>
            </div>

            <form id="uploadForm" class="space-y-5 flex-1 flex flex-col justify-center">
                <!-- ÁREA DE ARRASTAR ARQUIVO (DROP ZONE) -->
                <div id="dropZone" class="border border-dashed border-slate-700 hover:border-indigo-500/80 rounded-xl p-8 flex flex-col items-center justify-center bg-slate-950/40 hover:bg-slate-950/80 transition-all duration-300 cursor-pointer relative group/zone shadow-inner">
                    <input type="file" id="audioFile" name="audio_file" accept=".mp3,.wav,.m4a" class="absolute inset-0 opacity-0 cursor-pointer z-20" required>
                    
                    <div class="p-3.5 bg-slate-900 border border-slate-800 rounded-xl group-hover/zone:scale-110 group-hover/zone:border-indigo-500/30 group-hover/zone:text-indigo-400 text-slate-400 transition-all duration-300 shadow-md">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                    </div>
                    
                    <span id="fileName" class="text-xs font-semibold text-slate-300 mt-4 text-center block max-w-xs truncate group-hover/zone:text-slate-200 transition-colors">Arraste seu áudio ou clique para navegar</span>
                    <span class="text-[10px] uppercase font-bold tracking-wider text-slate-500 mt-1.5">MP3, WAV, M4A &bull; Máx 500MB</span>
                </div>

                <!-- CAMPO CONFIGURAÇÃO: TÍTULO DA AULA -->
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400">Identificador da Sessão</label>
                    <div class="relative">
                        <input type="text" id="classTitle" name="class_title" placeholder="Ex: Engenharia de APIs com LLMs" class="w-full bg-slate-950/50 border border-slate-800 focus:border-indigo-500/50 rounded-lg pl-4 pr-10 py-3 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-indigo-500/20 transition-all duration-300">
                        <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </div>
                    </div>
                </div>

                <!-- BOTÃO DE DISPARO DA TRANSCRIÇÃO -->
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold text-xs uppercase tracking-widest py-4 rounded-xl transition-all duration-300 shadow-[0_4px_20px_-4px_rgba(79,70,229,0.4)] hover:shadow-[0_4px_25px_-2px_rgba(79,70,229,0.5)] active:scale-[0.98]">
                    Iniciar Transcrição
                </button>
            </form>
        </div>

        <!-- COLUNA DIREITA: TERMINAL DE OUTPUT (7 das 12 colunas) -->
        <div class="lg:col-span-7 flex flex-col bg-slate-950/40 border border-slate-800/60 rounded-xl p-5 min-h-[380px] justify-between shadow-inner">
            <div class="flex flex-col flex-1 min-h-0">
                
                <!-- Barra de Cabeçalho do Terminal -->
                <div class="flex justify-between items-center border-b border-slate-800/80 pb-3 mb-4">
                    <div class="flex items-center space-x-2">
                        <div class="flex space-x-1">
                            <span class="w-2 h-2 rounded-full bg-red-500/40"></span>
                            <span class="w-2 h-2 rounded-full bg-yellow-500/40"></span>
                            <span class="w-2 h-2 rounded-full bg-green-500/40"></span>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 pl-1.5">Console logs & Output</span>
                    </div>
                    <span id="statusIndicator" class="text-[10px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-md bg-slate-900 border border-slate-800 text-slate-400 transition-all duration-300">Idle</span>
                </div>

                <!-- ÁREA DINÂMICA DE CONTEÚDO -->
                <div class="flex-1 overflow-y-auto custom-scroll pr-1">
                    <!-- Estado Vazio (Placeholder) -->
                    <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center text-slate-600 space-y-3 py-16 transition-all">
                        <div class="p-3 bg-slate-900/40 border border-slate-800/40 rounded-full">
                            <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <p class="text-xs font-semibold tracking-wide">Nenhum payload de áudio processado nesta janela.</p>
                    </div>

                    <!-- Caixa de Texto com Resposta (Código/Mono) -->
                    <textarea id="responseTextarea" class="w-full h-full min-h-[240px] bg-slate-950/20 border border-transparent rounded-lg p-3 text-xs font-mono text-slate-400 focus:outline-none resize-none hidden leading-relaxed custom-scroll" readonly></textarea>
                </div>
            </div>

            <!-- FOOTER CONTAINER: DOWNLOAD & METADADOS -->
            <div id="downloadContainer" class="mt-4 pt-4 border-t border-slate-800/80 flex items-center justify-between transition-all duration-500 opacity-0 transform translate-y-2 hidden">
                <div class="flex items-center space-x-3 truncate max-w-[240px]">
                    <div class="p-2 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-lg">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div class="text-xs truncate">
                        <p class="font-semibold text-slate-300 truncate">transcricao_final.txt</p>
                        <p id="fileSizeLabel" class="text-[10px] font-medium text-slate-500 mt-0.5">0.0 KB</p>
                    </div>
                </div>
                <button id="downloadBtn" type="button" class="flex items-center space-x-2 bg-slate-900 hover:bg-slate-800 text-indigo-400 hover:text-indigo-300 font-bold text-[10px] uppercase tracking-widest px-4 py-3 rounded-lg border border-slate-800 hover:border-slate-700 transition-all duration-300 active:scale-95 shadow-md">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>Salvar Texto</span>
                </button>
            </div>
        </div>

    </div>
<div id="feedback" class="hidden text-center p-2 font-bold"></div>
    <!-- VINCULAÇÃO DO SCRIPT DE LÓGICA DO CLIENTE CORRIGIDO -->
    <script src="/app.js"></script>
</body>
</html>
